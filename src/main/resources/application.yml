spring:
  application:
    name: aiforce-test2
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/aiforce}
    username: ${SPRING_DATASOURCE_USERNAME:aiforce}
    password: ${SPRING_DATASOURCE_PASSWORD:aiforce}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true

security:
  jwt:
    secret: ${SECURITY_JWT_SECRET:change-me-change-me-change-me-change-me-32}
    expiration-minutes: ${SECURITY_JWT_EXPIRATION_MINUTES:30}
  session:
    timeout-minutes: ${SECURITY_SESSION_TIMEOUT_MINUTES:30}

management:
  endpoints:
    web:
      exposure:
        include: health,info
