name: Build and Deploy to Kubernetes

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build
        run: mvn clean test package -DskipTests=false

      - name: Archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: application-jar
          path: target/*.jar

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: k8s
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${KUBECONFIG_B64}" | base64 -d > ~/.kube/config
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}

      - name: Apply namespace
        run: kubectl apply -f deploy/k8s/namespace.yaml

      - name: Apply config and service manifests
        run: |
          kubectl apply -f deploy/k8s/configmap.yaml
          kubectl apply -f deploy/k8s/secret-template.yaml
          kubectl apply -f deploy/k8s/service.yaml
          kubectl apply -f deploy/k8s/pdb.yaml
          kubectl apply -f deploy/k8s/hpa.yaml

      - name: Update deployment image
        run: |
          sed -e "s|\${IMAGE_REPOSITORY}|${IMAGE_REPOSITORY}|g" \
              -e "s|\${IMAGE_TAG}|${IMAGE_TAG}|g" deploy/k8s/deployment.yaml | kubectl apply -f -
        env:
          IMAGE_REPOSITORY: ${{ vars.IMAGE_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}

      - name: Smoke test
        run: bash scripts/smoke-test/auth-session-smoke.sh
        env:
          BASE_URL: ${{ vars.BASE_URL }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
