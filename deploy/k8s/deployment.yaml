apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiforce-test2
  namespace: aiforce-test2
  labels:
    app.kubernetes.io/name: aiforce-test2
    app.kubernetes.io/part-of: aiforce
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aiforce-test2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aiforce-test2
        app.kubernetes.io/part-of: aiforce
    spec:
      containers:
        - name: aiforce-test2
          image: ${IMAGE_REPOSITORY}:${IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: aiforce-test2-config
            - secretRef:
                name: aiforce-test2-secrets
          env:
            - name: SERVER_PORT
              value: "8080"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1024Mi"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 40
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            failureThreshold: 30
            periodSeconds: 5
      terminationGracePeriodSeconds: 30
