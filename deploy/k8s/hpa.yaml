apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aiforce-test2
  namespace: aiforce-test2
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aiforce-test2
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
